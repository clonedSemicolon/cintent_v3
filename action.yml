name: "Setup cintent_v3"
description: "Deterministic call graph tracer for CI — drop-in replacement for JavidDitty/setup-cintent"

inputs:
  nonblocking:
    description: "Ignored (kept for compatibility with setup-cintent)"
    default: "false"

runs:
  using: "composite"
  steps:
    - name: Setup cintent_v3
      shell: bash
      run: |
        # 1. Set env vars FIRST (always succeeds, even if pip install fails)
        CINTENT_ARTIFACT_NAME="$(date +%s%N)-cintent_v3_logs"
        CINTENT_LOGS="${{ github.workspace }}/cintent_v3_logs"
        mkdir -p "$CINTENT_LOGS"

        echo "CINTENT_V3_ENABLED=1" >> "$GITHUB_ENV"
        echo "CINTENT_V3_PROJECT_ROOT=${{ github.workspace }}" >> "$GITHUB_ENV"
        echo "CINTENT_V3_OUTPUT=$CINTENT_LOGS" >> "$GITHUB_ENV"
        echo "CINTENT_LOGS=$CINTENT_LOGS" >> "$GITHUB_ENV"
        echo "CINTENT_ARTIFACT_NAME=$CINTENT_ARTIFACT_NAME" >> "$GITHUB_ENV"

        # 2. Make cintent_v3 importable via PYTHONPATH (no pip install required)
        echo "PYTHONPATH=${{ github.action_path }}/src:${PYTHONPATH:-}" >> "$GITHUB_ENV"

        # 3. Tell pytest to auto-load the plugin
        echo "PYTEST_ADDOPTS=${PYTEST_ADDOPTS:-} -p cintent_v3.auto_plugin" >> "$GITHUB_ENV"

        # 4. Try pip install (may fail on Python < 3.10 — OK, PYTHONPATH handles it)
        pip install "${{ github.action_path }}" 2>/dev/null \
          || echo "[cintent_v3] pip install skipped — using PYTHONPATH fallback"

        echo "[cintent_v3] Ready. Logs will be written to: $CINTENT_LOGS"
