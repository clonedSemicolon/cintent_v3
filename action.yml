name: Setup cintent_v3
description: Deterministic call graph tracer for CI

inputs:
  nonblocking:
    description: Ignored (kept for compatibility with setup-cintent)
    default: "false"

runs:
  using: composite
  steps:
    - name: Setup cintent_v3
      shell: bash
      run: |
        CINTENT_ARTIFACT_NAME="$(date +%s%N)-cintent_v3_logs"
        CINTENT_LOGS="${{ github.workspace }}/cintent_v3_logs"
        mkdir -p "$CINTENT_LOGS"
        echo "CINTENT_ARTIFACT_NAME=$CINTENT_ARTIFACT_NAME" >> "$GITHUB_ENV"
        echo "CINTENT_LOGS=$CINTENT_LOGS" >> "$GITHUB_ENV"
        echo "CINTENT_V3_ENABLED=1" >> "$GITHUB_ENV"
        echo "CINTENT_V3_OUTPUT=$CINTENT_LOGS" >> "$GITHUB_ENV"
        echo "CINTENT_V3_PROJECT_ROOT=${{ github.workspace }}" >> "$GITHUB_ENV"
        if pip install "${{ github.action_path }}" --quiet 2>/dev/null; then
          echo "[cintent_v3] Installed via pip. Plugin auto-loads via pytest11."
        else
          echo "[cintent_v3] pip install skipped. Writing skip metadata."
          echo "{\"tool\":\"cintent_v3\",\"skipped\":true}" > "$CINTENT_LOGS/cintent_v3_metadata.json"
        fi
