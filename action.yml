name: "Setup cintent_v3"
description: "Deterministic call graph tracer for CI — drop-in replacement for JavidDitty/setup-cintent"

inputs:
  nonblocking:
    description: "Ignored (kept for compatibility with setup-cintent)"
    default: "false"

runs:
  using: "composite"
  steps:
    - name: Install cintent_v3
      shell: bash
      run: pip install "${{ github.action_path }}"

    - name: Enable tracing
      shell: bash
      run: |
        mkdir -p "${{ github.workspace }}/cintent_v3_logs"
        echo "CINTENT_V3_ENABLED=1" >> "$GITHUB_ENV"
        echo "CINTENT_V3_PROJECT_ROOT=${{ github.workspace }}" >> "$GITHUB_ENV"
        echo "CINTENT_V3_OUTPUT=${{ github.workspace }}/cintent_v3_logs" >> "$GITHUB_ENV"
        echo "CINTENT_LOGS=${{ github.workspace }}/cintent_v3_logs" >> "$GITHUB_ENV"
        echo "CINTENT_ARTIFACT_NAME=cintent_v3-logs" >> "$GITHUB_ENV"
