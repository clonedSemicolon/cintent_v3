name: cintent_v3 Reusable Trace

on:
  workflow_call:
    inputs:
      tests-dir:
        description: "Test directory relative to repo root"
        default: "tests/"
        required: false
        type: string
      python-version:
        description: "Python version to use"
        default: "3.11"
        required: false
        type: string
    secrets:
      GH_PACKAGES_TOKEN:
        required: true

jobs:
  trace:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install project dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e . || true
          pip install pytest

      - name: Install cintent_v3
        env:
          GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
        run: |
          pip install \
            --extra-index-url https://__token__:${GH_PACKAGES_TOKEN}@pip.pkg.github.com/clonedSemicolon \
            cintent_v3==0.1.0

      - name: Trace tests
        run: python -m cintent_v3 ci collect . -t ${{ inputs.tests-dir }} -o cintent_v3_artifact.zip
        continue-on-error: true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cintent_v3-logs
          path: cintent_v3_artifact.zip
